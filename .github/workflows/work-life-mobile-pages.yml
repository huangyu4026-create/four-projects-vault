name: Deploy work-life mobile page

on:
  push:
    branches:
      - main
    paths:
      - "work-life-mobile/**"
      - ".github/workflows/work-life-mobile-pages.yml"
      - ".nojekyll"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: work-life-mobile
          sparse-checkout-cone-mode: true

      - name: Prepare static site
        run: |
          mkdir -p _site/work-life-mobile
          cp -R work-life-mobile/. _site/work-life-mobile/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
