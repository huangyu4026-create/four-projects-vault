<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2f6f62" />
  <title>清风显化 · 本身即美 生活本身</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <script src="./cloud-config.js?v=20260629-sync20"></script>
  <style>
    :root {
      --bg: #eef1ed;
      --surface: #ffffff;
      --soft: #f7f8f5;
      --ink: #202627;
      --muted: #66706c;
      --line: #dce2da;
      --green: #2f6f62;
      --teal: #2d6f78;
      --red: #b9444b;
      --amber: #a8622a;
      --blue: #3f6797;
      --shadow: 0 20px 60px rgba(28, 36, 34, .10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }
    button, input, textarea, select { font: inherit; color: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--surface);
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 7px;
      cursor: pointer;
    }
    button:hover { border-color: #aebbb5; }
    button.primary { background: var(--green); border-color: var(--green); color: white; }
    button.ghost { background: transparent; }
    button.icon {
      width: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      font-weight: 800;
    }
    button:active { transform: translateY(1px); }
    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: var(--surface);
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 7px;
      color: inherit;
      text-decoration: none;
      font-size: 13px;
    }
    a.btn:hover { border-color: #aebbb5; }
    a.btn.primary { background: var(--green); border-color: var(--green); color: white; }
    input, textarea, select {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: white;
      padding: 8px 10px;
      min-height: 36px;
    }
    textarea { resize: vertical; line-height: 1.55; width: 100%; }
    .desktop {
      display: grid;
      grid-template-columns: 268px minmax(0, 1fr) 374px;
      min-height: 100vh;
    }
    .rail {
      border-right: 1px solid var(--line);
      background: #e6ebe5;
      padding: 18px 14px;
      overflow: auto;
    }
    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 4px 4px 16px;
    }
    .mark {
      width: 58px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--green);
      color: white;
      font-weight: 900;
      font-size: 12px;
      line-height: 1.1;
      white-space: pre-line;
      text-align: center;
      padding: 4px 2px;
      box-sizing: border-box;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: 18px; line-height: 1.2; margin-bottom: 2px; }
    h1 span { display: block; }
    h2 { font-size: 24px; margin-bottom: 7px; }
    h3 { font-size: 15px; margin-bottom: 0; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .section-title {
      color: var(--muted);
      font-size: 12px;
      margin: 14px 7px 7px;
    }
    .project {
      display: grid;
      gap: 3px;
      width: 100%;
      text-align: left;
      border-color: transparent;
      background: transparent;
      padding: 10px;
      margin-bottom: 6px;
    }
    .project.active {
      background: white;
      border-color: var(--line);
      box-shadow: 0 10px 24px rgba(28, 36, 34, .06);
    }
    .project strong { font-size: 14px; }
    .count {
      display: inline-grid;
      place-items: center;
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      background: #dde9e6;
      color: var(--green);
      font-size: 12px;
      font-weight: 700;
    }
    .quick {
      display: inline-flex;
      gap: 0;
    }
    .quick button {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border-radius: 0;
      border-top: 0;
      border-bottom: 0;
      text-align: left;
      gap: 7px;
    }
    .quick button.active {
      background: var(--green);
      color: white;
    }
    .main {
      padding: 22px;
      min-width: 0;
      overflow: auto;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
    }
    .statusbar {
      display: grid;
      grid-template-columns: repeat(5, minmax(110px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .metric {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .metric strong { display: block; font-size: 20px; margin-top: 2px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }
    .seg {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: white;
    }
    .seg button {
      border: 0;
      border-radius: 0;
      background: transparent;
      white-space: nowrap;
    }
    .seg button.active { background: var(--green); color: white; }
    .timeline {
      display: grid;
      gap: 14px;
    }
    .bucket {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 32px rgba(28, 36, 34, .06);
      overflow: hidden;
    }
    .bucket-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfa;
    }
    .bucket-body {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
      padding: 12px;
    }
    .group {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      min-height: 88px;
    }
    .group-title {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .task {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) auto;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      align-items: start;
    }
    .task:last-child { border-bottom: 0; }
    .task input[type="checkbox"] {
      width: 18px;
      height: 18px;
      min-height: auto;
      margin: 2px 0 0;
      accent-color: var(--green);
    }
    .task strong {
      display: block;
      line-height: 1.35;
      font-size: 14px;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }
    .task-actions {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      margin-top: 8px;
    }
    .task-action {
      min-height: 24px;
      padding: 2px 8px;
      font-size: 12px;
      background: #f2f4f2;
      color: #5a635f;
      border-color: #d5ddd8;
      transition: all 0.2s ease;
    }
    .task-action.is-important {
      background: #f8d7dd;
      color: #b4233a;
      border-color: #f5b7c2;
      font-weight: 700;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      white-space: nowrap;
      background: #e9eeea;
      color: #43504c;
    }
    .pill.red { background: #f6e1e4; color: var(--red); }
    .pill.amber { background: #faeadb; color: var(--amber); }
    .pill.green { background: #e0f0e7; color: var(--green); }
    .pill.neutral { background: #efefef; color: #5a635f; }
    .pill.blue { background: #e3edf8; color: var(--blue); }
    .pill.teal { background: #dceeee; color: var(--teal); }
    .panel {
      border-left: 1px solid var(--line);
      background: #f9faf7;
      padding: 18px 14px;
      overflow: auto;
    }
    .box {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(28, 36, 34, .06);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .box-head {
      padding: 12px 13px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .box-body { padding: 13px; }
    .composer {
      display: grid;
      gap: 9px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .chip {
      border-radius: 999px;
      background: #edf2ef;
      border-color: transparent;
      min-height: 30px;
      font-size: 12px;
    }
    .chip.active {
      background: #1f6f5f;
      color: white;
      box-shadow: 0 4px 10px rgba(31, 111, 95, .18);
    }
    .category-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .category-choice {
      border-radius: 999px;
      min-height: 30px;
      font-size: 12px;
      background: white;
    }
    .category-choice.active {
      background: #263d37;
      color: white;
      border-color: #263d37;
    }
    .inbox {
      display: grid;
      gap: 9px;
      max-height: 280px;
      overflow: auto;
    }
    .message {
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 8px;
      padding: 9px;
    }
    .message p {
      margin: 4px 0 0;
      line-height: 1.45;
      font-size: 13px;
    }
    .receipt {
      display: grid;
      gap: 8px;
    }
    .daily-checkin { display: grid; gap: 4px; }
    .daily-checkin-row {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      padding: 4px 0;
      border-bottom: 1px solid var(--line);
    }
    .daily-checkin-row:last-child { border-bottom: 0; }
    .daily-checkin-row.pending {
      border-left: 2px solid var(--red);
      padding-left: 6px;
    }
    .daily-checkin-today { color: #153a33; font-weight: 600; margin-bottom: 2px; }
    .daily-checkin-progress.missing { color: var(--red); }
    .daily-checkin-time { color: var(--muted); font-size: 11px; margin-top: 1px; }
    .daily-checkin-title { font-size: 13px; line-height: 1.3; }
    .daily-checkin-report { margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--line); font-size: 11px; line-height: 1.4; color: var(--muted); }
    .daily-checkin-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .daily-checkin-actions button { min-height: 28px; }
    .service-status {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #f4f7f4;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .service-status.ok {
      background: #e5f2ec;
      color: var(--green);
      border-color: #c5ded3;
    }
    .service-status.warn {
      background: #fff4e8;
      color: var(--amber);
      border-color: #efd4b5;
    }
    .receipt-flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 5px;
      margin-top: 8px;
    }
    .receipt-step {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 6px;
      color: var(--muted);
      background: white;
      text-align: center;
      font-size: 11px;
      white-space: nowrap;
    }
    .receipt-step.on {
      background: #e5f2ec;
      border-color: #b9d9cc;
      color: var(--green);
      font-weight: 700;
    }
    .receipt-step.fail {
      background: #f7e4e5;
      border-color: #e7b9be;
      color: var(--red);
      font-weight: 700;
    }
    .empty {
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }
    .drawer {
      position: fixed;
      inset: 0;
      background: rgba(24, 31, 30, .24);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 10;
    }
    .drawer.open { display: flex; }
    .dialog {
      width: min(720px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }
    .form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .field { display: grid; gap: 5px; }
    .field.full { grid-column: 1 / -1; }
    label { color: var(--muted); font-size: 12px; }
    .hidden { display: none !important; }
    .topbar-actions {
      display: grid;
      grid-template-columns: auto auto;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }
    .quick-actions-row {
      display: inline-flex;
      gap: 0;
      justify-content: flex-end;
    }
    .status-refresh-wrap {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .status-refresh-wrap button {
      min-height: 34px;
      white-space: nowrap;
    }
    @media (max-width: 1180px) {
      .desktop { grid-template-columns: 230px minmax(0, 1fr); }
      .panel { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line); }
    }
    @media (max-width: 760px) {
      body { padding-bottom: env(safe-area-inset-bottom); }
      .desktop { grid-template-columns: 1fr; }
      .rail {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        z-index: 5;
        padding: 12px;
      }
      .main { padding: 12px; }
      .panel { padding: 12px; }
      .statusbar { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .top { flex-direction: column; }
      .topbar-actions,
      .status-refresh-wrap,
      .quick-actions-row {
        justify-content: stretch;
        width: 100%;
      }
      .topbar-actions {
        grid-template-columns: 1fr;
      }
      .quick-actions-row {
        width: 100%;
        overflow: auto;
      }
      .quick-actions-row::-webkit-scrollbar { display: none; }
      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 8px;
      }
      #searchBox {
        grid-column: 1 / -1;
      }
      .seg button {
        min-height: 38px;
        padding: 0 10px;
      }
      .task { grid-template-columns: 26px minmax(0, 1fr) auto; }
      .receipt-flow { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .form { grid-template-columns: 1fr; }
      .inbox { max-height: 320px; }
      .box-head { gap: 6px; }
      .timeline { gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="desktop">
    <aside class="rail">
      <div class="brand">
        <div class="mark">清风<br>显化</div>
        <div>
          <h1><span>本身即美</span><span>生活本身</span></h1>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="box">
        <div class="box-head">
          <h3>任务入口</h3>
          <span class="pill teal" id="activeProjectPill"></span>
        </div>
        <div class="box-body composer">
          <div class="field">
            <label>触发词类型（可多选）</label>
            <div class="category-picker" id="messageCategories"></div>
          </div>
          <textarea id="messageText" rows="5" placeholder="把零散纪要、任务、提醒粘贴到这里。可以同时选择“提取纪要 / 排连续日期 / 重要提醒”，再生成计划。"></textarea>
          <div class="chips">
            <button class="chip" data-mode="extract">提取纪要</button>
            <button class="chip" data-mode="continuous">排连续日期</button>
            <button class="chip" data-mode="important">重要提醒</button>
          </div>
          <button id="sendMessage" class="primary">加入手机本地计划</button>
          <div id="serviceStatus" class="service-status ok">手机独立模式：不连接电脑后台，计划保存在本机。</div>
        </div>
      </div>

      <div class="top">
        <div>
          <h2 id="projectTitle" class="hidden"></h2>
          <p id="projectDesc" class="muted hidden"></p>
        </div>
        <div class="topbar-actions">
          <div class="quick-actions-row">
          <div class="seg" id="quickActions"></div>
          </div>
          <div class="status-refresh-wrap">
            <button id="hardRefreshBtn" onclick="refreshAllState()">刷新最新状态</button>
            <button id="clearInboxTop" onclick="clearAndSyncInbox()">清空消息</button>
            <button id="exportBtn">导出</button>
          </div>
          <div id="syncStatus" class="service-status ok">手机独立模式：刷新只读取本机数据。</div>
          <div id="syncProbeStatus" class="service-status ok">同步检测：已关闭电脑后台依赖。</div>
        </div>
      </div>
      <div class="statusbar" id="metrics"></div>
        <div class="toolbar">
          <div class="seg" id="displayMode"></div>
          <select id="typeFilter" aria-label="分类类型"></select>
          <select id="ownerFilter" aria-label="负责人分类"></select>
          <input id="searchBox" placeholder="搜索任务 / 分类 / 工程 / 完成标准" />
        </div>
      <div class="box">
        <div class="box-head"><h3>每日动作打卡</h3></div>
        <div class="box-body daily-checkin" id="dailyCheckinBox"></div>
      </div>
      <section class="timeline" id="timeline"></section>
    </main>

    <aside class="panel">
      <div class="box">
        <div class="box-head">
          <h3>消息与回执</h3>
          <div style="display:flex;gap:8px;">
            <button id="clearInbox" class="ghost" onclick="clearAndSyncInbox()">清空消息</button>
          <button id="refreshReceipts" class="ghost">刷新</button>
          </div>
        </div>
        <div class="box-body inbox" id="inbox"></div>
      </div>

      <div class="box">
        <div class="box-head"><h3>本地库入口</h3></div>
        <div class="box-body receipt">
          <button id="localTaskLibrary" class="primary">本地任务库</button>
          <button id="localScheduleView">本地日程视图</button>
          <button id="localCategoryView">本地分类视图</button>
          <button id="localReceiptView">消息回执</button>
        </div>
      </div>

    </aside>
  </div>

  <script>
    if (typeof structuredClone !== "function") {
      window.structuredClone = value => JSON.parse(JSON.stringify(value));
    }
    const STANDALONE_MOBILE_MODE = true;
    const today = new Date();
    today.setHours(9, 0, 0, 0);
    const iso = d => {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    };
    const add = n => { const d = new Date(today); d.setDate(d.getDate() + n); return iso(d); };
    const schema = {
      statuses: ["待确认", "待办", "进行中", "等待反馈", "已完成", "已取消", "已延期"],
      priorities: ["P0紧急", "P1重要", "P2普通", "P3低"],
      types: ["策划", "文案", "拍摄", "剪辑", "发布", "复盘", "开发", "设计", "沟通", "运营", "其他"],
      timeTypes: ["今天", "明天", "后天", "3天后", "4天后", "5天后", "以后", "逾期"],
      ranges: [
        ["7", "近期7天"],
        ["14", "近期14天"],
        ["30", "近期30天"],
        ["all", "全部有任务日期"],
        ["late", "只看逾期"]
      ]
    };
    const DAILY_CHECKIN_PLAN = [
      { id: "coldShower", time: "09:00", title: "早上冷水澡冲凉" },
      { id: "brewCoffee", time: "09:30", title: "早上冲咖啡" },
      { id: "morningStandup", time: "09:30-11:00", title: "早间晨会（到 11:00）" },
      { id: "hongloumeng", time: "11:00-11:30", title: "红楼梦学习（30 分钟）" },
      { id: "publishNotes", time: "11:30-12:00", title: "各平台笔记发布" },
      { id: "reading", time: "12:30以前", title: "阅读学习（12:30 前）" },
      { id: "shoot", time: "12:30-15:00", title: "小红书拍摄（1 小时，自行安排）" },
      { id: "gym", time: "15:00-16:30", title: "运动训练（1.5 小时）" },

    function buildDailyCheckinAnalytics(months = DAILY_CHECKIN_HISTORY_MONTHS) {
      const targetMonths = Math.max(1, Math.min(Number(months) || 1, DAILY_CHECKIN_HISTORY_MONTHS));
      const today = todayDate();
      const todayDateObj = new Date(today + "T00:00:00");
      const history = data.dailyCheckin?.history || {};
      const records = data.dailyCheckin?.records || {};
      const monthly = [];
      for (let i = 0; i < targetMonths; i++) {
        const monthBase = new Date(todayDateObj.getFullYear(), todayDateObj.getMonth() - i, 1);
        const monthStartText = iso(monthBase).slice(0, 7);
        const rows = Object.keys(history)
          .filter(date => date.startsWith(monthStartText))
          .map(date => history[date])
          .sort((a, b) => (a.date > b.date ? 1 : -1));
        if (i === 0 && records[today]) {
          const todaySnapshot = buildDailyCheckinSnapshot(today, records[today]);
          const existing = rows.find(item => item.date === today);
          if (!existing) rows.push(todaySnapshot);
        }
        const totalDays = rows.length;
        const completedDays = rows.filter(item => item.isFull).length;
        const avgRate = totalDays ? Math.round(rows.reduce((acc, item) => acc + item.completionRate, 0) / totalDays) : 0;
        const missingCounter = {};
        rows.forEach(item => {
          (item.missingIds || []).forEach(id => { missingCounter[id] = (missingCounter[id] || 0) + 1; });
        });
        const topMissing = Object.entries(missingCounter)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 3)
          .map(([id, count]) => ({ id, count }));
        monthly.push({
          month: monthStartText,
          totalDays,
          completedDays,
          avgRate,
          topMissing
        });
      }
      return {
        updatedAt: Date.now(),
        periodMonths: targetMonths,
        monthly
      };
    }

    function ensureDailyCheckinForToday() {
      if (!data.dailyCheckin || typeof data.dailyCheckin !== "object") {
        data.dailyCheckin = { lastDate: "", records: {} };
      }
      if (!data.dailyCheckin.records || typeof data.dailyCheckin.records !== "object") {
        data.dailyCheckin.records = {};
      }
      const date = todayDate();
      if (data.dailyCheckin.lastDate !== date) {
        if (data.dailyCheckin.lastDate) {
          collectDailyCheckinForDate(data.dailyCheckin.lastDate, { force: true });
        }
        data.dailyCheckin.lastDate = date;
      }
      if (!data.dailyCheckin.records[date]) data.dailyCheckin.records[date] = {};
      pruneDailyCheckinRecords(data.dailyCheckin.records);
    }

    function isDailyChecked(id) {
      ensureDailyCheckinForToday();
      return Boolean(data.dailyCheckin.records[todayDate()]?.[id]);
    }

    function setDailyChecked(id, checked) {
      ensureDailyCheckinForToday();
      const date = todayDate();
      const bucket = data.dailyCheckin.records[date] || {};
      bucket[id] = !!checked;
      data.dailyCheckin.records[date] = bucket;
      save();
      renderDailyCheckin();
    }

    function clearTodayDailyCheckin() {
      ensureDailyCheckinForToday();
      collectDailyCheckinForDate(todayDate(), { force: true });
      data.dailyCheckin.records[todayDate()] = {};
      save();
      renderDailyCheckin();
    }

    function buildDailyCheckinReport() {
      const today = new Date();
      const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
      const currentDate = todayDate();
      const cursor = new Date(monthStart.getFullYear(), monthStart.getMonth(), monthStart.getDate());
      const entries = [];
      const missed = [];
      const incomplete = [];
      const todayRow = data.dailyCheckin?.records?.[currentDate] || {};
      const todayDoneCount = DAILY_CHECKIN_IDS.filter(id => todayRow[id]).length;
      const todayMissing = DAILY_CHECKIN_IDS.filter(id => !todayRow[id]).map(id => DAILY_CHECKIN_PLAN.find(x => x.id === id)?.title || id);
      while (cursor <= today) {
        const date = iso(cursor);
        const row = data.dailyCheckin?.records?.[date] || {};
        const doneCount = DAILY_CHECKIN_IDS.filter(id => row[id]).length;
        if (doneCount === DAILY_CHECKIN_IDS.length) {
          entries.push(date);
        } else {
          const missingItems = DAILY_CHECKIN_IDS.filter(id => !row[id]).map(id => DAILY_CHECKIN_PLAN.find(x => x.id === id)?.title || id);
          if (data.dailyCheckin?.records?.[date]) {
            incomplete.push({ date, missingItems });
          } else {
            missed.push(date);
          }
          entries.push(`${date}`);
        }
        cursor.setDate(cursor.getDate() + 1);
      }
      const completedDays = entries.filter(date => {
        const row = data.dailyCheckin?.records?.[date] || {};
        return DAILY_CHECKIN_IDS.every(id => row[id]);
      }).length;
      const totalDays = entries.length;
      const missDates = entries.filter(date => {
        const row = data.dailyCheckin?.records?.[date] || {};
        if (!data.dailyCheckin?.records?.[date]) return true;
        return !DAILY_CHECKIN_IDS.every(id => row[id]);
      });
      const list = (missDates.length ? missDates : []).slice(0, 12).join("，");
      const more = missDates.length > 12 ? `，还有 ${missDates.length - 12} 天` : "";
      return {
        completedDays,
        totalDays,
        missCount: missDates.length,
        missList: missDates,
        todayDoneCount,
        todayMissing,
        text: `本月已完成打卡天数：${completedDays}/${totalDays}。` + (missDates.length ? `未完成：${list}${more}` : "全部完成")
      };
    }

    async function syncStateToServer() {
      if (STANDALONE_MOBILE_MODE) {
        if (isCloudSyncEnabled()) return syncStateToCloud();
        writeLocalStateFallback();
        emitStateSyncPulse();
        return true;
      }
      const base = await resolveStateApiBase();
      if (!base) {
        writeLocalStateFallback();
        if (location.protocol === "file:" || readLocalStateFallback()) return false;
        throw new Error(`未检测到可用同步端口，无法将桌面任务写入后台状态。请确认 8790x 或 8800/8801 端口服务已启动。${formatStateHostFailureTip() ? ` 最近失败：${formatStateHostFailureTip()}` : ""}`);
      }
      localStorage.setItem(stateHostCacheKey, base);
      const payload = { state: data };
      const res = await fetch(`${base}/api/state`, {
        method: "POST",
        cache: "no-store",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        throw new Error(`写入状态失败：HTTP ${res.status}`);
      }
      const body = await res.json().catch(() => null);
      if (body && body.ok === false) throw new Error(`服务返回失败：${body.error || "ok:false"}`);
      return true;
    }

    function emitStateSyncPulse() {
      try {
        localStorage.setItem(statePulseKey, String(Date.now()));
      } catch {
      }
      if (!stateSyncChannel) return;
      try {
        stateSyncChannel.postMessage({
          type: "workCockpitStateSync",
          state: data
        });
      } catch {
      }
    }

    async function refreshStateFromServer() {
      if (STANDALONE_MOBILE_MODE) {
        if (isCloudSyncEnabled()) return refreshStateFromCloud();
        const snapshot = data;
        data = mergePendingLocalTasks(load(), snapshot);
        localStorage.setItem(storageKey, JSON.stringify(data));
        return true;
      }
      if (location.protocol === "file:") {
        const base = await resolveStateApiBase();
        if (!base) {
          return false;
        }
        stateApiBase = base;
      }
      if (!isHttpBase(stateApiBase)) {
        return false;
      }
      const res = await fetch(`${stateApiBase}/api/state?t=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) return false;
      const body = await res.json().catch(() => null);
      if (body && body.ok === false) return false;
      const state = body?.state && typeof body.state === "object" ? body.state : (body && typeof body === "object" ? body : null);
      if (!state || typeof state !== "object") return false;
      const snapshot = data;
      data = mergePendingLocalTasks(state, snapshot);
      localStorage.setItem(storageKey, JSON.stringify(data));
      return true;
    }
    async function readBackStateFromServer() {
      if (STANDALONE_MOBILE_MODE) {
        if (!isCloudSyncEnabled()) return data;
        const remote = await fetchCloudState().catch(() => null);
        return remote?.state || data;
      }
      if (!isHttpBase(stateApiBase)) {
        return null;
      }
      const res = await fetch(`${stateApiBase}/api/state?t=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) return null;
      const body = await res.json().catch(() => null);
      if (body && body.ok === false) return null;
      const state = body?.state && typeof body.state === "object" ? body.state : (body && typeof body === "object" ? body : null);
      return state && typeof state === "object" ? state : null;
    }

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(data));
      writeLocalStateFallback();
      emitStateSyncPulse();
      queueStateSync();
    }
    function loadTaskCompletionLocks() {
      try {
        const raw = JSON.parse(localStorage.getItem(taskCompletionLocksKey) || "{}");
        return raw && typeof raw === "object" ? raw : {};
      } catch {
        return {};
      }
    }
    function saveTaskCompletionLocks(locks) {
      localStorage.setItem(taskCompletionLocksKey, JSON.stringify(locks || {}));
    }
    function setTaskCompletionLock(id, checked) {
      const locks = loadTaskCompletionLocks();
      if (checked) {
        locks[id] = { status: "已完成", completedAt: iso(today), lockedAt: Date.now() };
      } else {
        delete locks[id];
      }
      saveTaskCompletionLocks(locks);
    }
    function normalize(raw) {
      const next = { ...structuredClone(seed), ...raw };
      next.categories = structuredClone(seed.categories);
      next.projects = next.projects?.filter(p => p.id !== "all") || structuredClone(seed.projects);
      next.people = structuredClone(seed.people);
      if (localStorage.getItem(inboxResetVersionKey) !== inboxResetVersion) {
        next.messages = [];
        localStorage.setItem(inboxResetVersionKey, inboxResetVersion);
      }
      const hardClearTs = Number(localStorage.getItem(inboxHardClearKey) || 0);
      const stateClearTs = Number(next.inboxAutoClearEpoch || 0);
      if (hardClearTs && hardClearTs >= stateClearTs) {
        next.inboxAutoFillEnabled = false;
        next.inboxAutoClearEpoch = hardClearTs;
        next.messages = [];
      }
      if (localStorage.getItem(inboxAutoFillDisableKey) === "1") {
        next.inboxAutoFillEnabled = false;
      }
      next.tasks = (next.tasks || []).map(t => ({
        ...t,
        categoryIds: normalizeCategoryIds(t.categoryIds || [t.categoryId || categoryNameToId(t.category) || inferCategoryFromLegacy(t)]),
        categoryId: normalizeCategoryId(t.categoryId || categoryNameToId(t.category) || inferCategoryFromLegacy(t)),
        category: t.category || category(normalizeCategoryId(t.categoryId || categoryNameToId(t.category) || inferCategoryFromLegacy(t))).name,
        projectId: t.projectId === "all" ? "p1" : (t.projectId || "p1"),
        due: t.due || add(1)
      }));
      const taskLocks = loadTaskCompletionLocks();
      next.tasks = next.tasks.map(t => taskLocks[t.id] ? {
        ...t,
        status: "已完成",
        completedAt: taskLocks[t.id].completedAt || t.completedAt || iso(today)
      } : t);
      next.messages = normalizeMessages(next.messages || []);
      if (next.inboxAutoFillEnabled === false && !(STANDALONE_MOBILE_MODE && isCloudSyncEnabled())) {
        next.messages = [];
      }
      next.dailyCheckin = normalizeDailyCheckin(next.dailyCheckin || {});
      return next;
    }
    function isLocalGeneratedTask(task) {
      const sourceEntryId = String(task?.sourceEntryId || "");
      return /^local-|^offline-/.test(sourceEntryId) || String(task?.reason || "").includes("本地规则离线生成");
    }
    function mergePendingLocalTasks(remoteState, fallbackState) {
      const remote = normalize(remoteState || {});
      const localTasks = Array.isArray(fallbackState?.tasks) ? fallbackState.tasks : [];
      const pendingTasks = localTasks.filter(isLocalGeneratedTask);
      if (!pendingTasks.length) return remote;
      const seen = new Set(remote.tasks.map(t => `${t.name || ""}||${t.due || ""}`));
      pendingTasks.forEach(task => {
        if (!task?.name || !task?.due) return;
        const key = `${task.name}||${task.due}`;
        if (seen.has(key)) return;
        remote.tasks = [task, ...remote.tasks];
        seen.add(key);
      });
      return remote;
    }

    function mergeBundledOriginalState(importedState) {
      const imported = normalize(importedState || {});
      const existingTaskIds = new Set(data.tasks.map(task => String(task.id || "")).filter(Boolean));
      const existingTaskKeys = new Set(data.tasks.map(task => `${task.name || ""}||${task.due || ""}`));
      const importedTasks = (imported.tasks || []).filter(task => {
        const id = String(task.id || "");
        const key = `${task.name || ""}||${task.due || ""}`;
        return task.name && task.due && !(id && existingTaskIds.has(id)) && !existingTaskKeys.has(key);
      }).map(task => ({
        ...task,
        sourceEntryId: task.sourceEntryId || "original-work-plan-import"
      }));
      if (importedTasks.length) {
        data.tasks = [...importedTasks, ...data.tasks];
      }

      const existingMessageKeys = new Set(data.messages.map(message => `${message.entryId || ""}||${message.time || ""}||${message.text || ""}`));
      const importedMessages = (imported.messages || []).filter(message => {
        const key = `${message.entryId || ""}||${message.time || ""}||${message.text || ""}`;
        return message.text && !existingMessageKeys.has(key);
      });
      if (importedMessages.length) {
        data.messages = [...importedMessages, ...data.messages];
      }

      if (imported.dailyCheckin?.records) {
        ensureDailyCheckinForToday();
        data.dailyCheckin.records = {
          ...imported.dailyCheckin.records,
          ...(data.dailyCheckin.records || {})
        };
        data.dailyCheckin.history = {
          ...(imported.dailyCheckin.history || {}),
          ...(data.dailyCheckin.history || {})
        };
      }

      if (importedTasks.length || importedMessages.length) {
        save();
      }
      return { tasks: importedTasks.length, messages: importedMessages.length };
    }

    async function importBundledOriginalState() {
      if (localStorage.getItem(bundledOriginalStateImportKey) === bundledOriginalStateVersion) {
        return { skipped: true, tasks: 0, messages: 0 };
      }
      try {
        const res = await fetch(`${bundledOriginalStateUrl}?v=${encodeURIComponent(bundledOriginalStateVersion)}`, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const payload = await res.json();
        const importedState = payload?.state && typeof payload.state === "object" ? payload.state : payload;
        const result = mergeBundledOriginalState(importedState);
        localStorage.setItem(bundledOriginalStateImportKey, bundledOriginalStateVersion);
        if ((result.tasks || result.messages) && $("syncStatus")) {
          $("syncStatus").className = "service-status ok";
          $("syncStatus").textContent = `已同步原有计划：${result.tasks} 条任务，${result.messages} 条消息。${nowClock()}`;
        }
        return result;
      } catch (err) {
        if ($("syncStatus")) {
          $("syncStatus").className = "service-status warn";
          $("syncStatus").textContent = `原有计划暂未同步：${err.message || err}。${nowClock()}`;
        }
        return { error: true, tasks: 0, messages: 0 };
      }
    }

    function normalizeLegacyMobileMessage(item) {
      if (!STANDALONE_MOBILE_MODE || !String(item?.entryId || "").startsWith("WP-")) return item;
      if (["已处理", "已答复", "运行失败", "历史已导入"].includes(item.status)) return item;
      return {
        ...item,
        status: "历史已导入",
        receipt: "历史电脑后台回执：对应任务已导入手机计划。手机独立版不再等待旧电脑后台处理。"
      };
    }

    function normalizeMessages(rows) {
      const seen = new Set();
      const out = [];
      rows.forEach(item => {
        if (!item || typeof item !== "object") return;
        const normalizedItem = normalizeLegacyMobileMessage(item);
        const entryId = normalizedItem.entryId || "";
        const key = entryId ? `entry:${entryId}` : `id:${normalizedItem.id || `time:${normalizedItem.time || ""}-text:${normalizedItem.text || ""}`}`;
        if (seen.has(key)) return;
        seen.add(key);
        out.push({
          ...normalizedItem,
          categoryIds: normalizeCategoryIds(normalizedItem.categoryIds || [normalizedItem.categoryId || inferCategoryFromLegacy(normalizedItem)]),
          categoryId: normalizeCategoryId(normalizedItem.categoryId || inferCategoryFromLegacy(normalizedItem)),
          projectId: normalizedItem.projectId === "all" ? "p1" : (normalizedItem.projectId || "p1")
        });
      });
      return out;
    }
    function normalizeCategoryIds(ids) {
      const rows = (Array.isArray(ids) ? ids : [ids]).map(normalizeCategoryId);
      return [...new Set(rows.length ? rows : ["other"])];
    }
    function normalizeCategoryId(id) {
      if (id === "work") return "other";
      if (seed.categories.some(c => c.id === id)) return id;
      const byName = categoryNameToId(id);
      if (byName) return byName;
      return "other";
    }
    function categoryNameToId(name) {
      const map = {
        "小红书": "xiaohongshu",
        "清风别墅": "qingfeng",
        "生活": "life",
        "学习": "study",
        "外出": "outside",
        "外出·生活": "life",
        "数字生命": "other",
        "其他": "other"
      };
      return map[name] || "";
    }
    function inferCategoryFromLegacy(row) {
      const text = `${row.name || ""} ${row.text || ""} ${row.type || ""} ${row.projectId || ""}`;
      if (/小红书|视频|发布|剪辑|脚本/.test(text)) return "xiaohongshu";
      if (/清风|别墅/.test(text)) return "qingfeng";
      if (/学习|读书|课程|论文|研究/.test(text)) return "study";
      if (/外出|出门|行程/.test(text)) return "outside";
      if (/生活|家务|日常/.test(text)) return "life";
      return "other";
    }
    function uid(p) { return p + Math.random().toString(36).slice(2, 9); }
    function esc(v) { return String(v || "").replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[m])); }
    function project(id) { return data.projects.find(p => p.id === id) || data.projects[0]; }
    function category(id) { return data.categories.find(c => c.id === id) || data.categories[0]; }
    function person(id) { return data.people.find(p => p.id === id)?.name || "待指定"; }
    function taskCategoryIds(t) { return normalizeCategoryIds(t.categoryIds || [t.categoryId]); }
    function taskCategoryNames(t) { return taskCategoryIds(t).map(id => category(id).name).join("、"); }
    function closed(t) { return t.status === "已完成" || t.status === "已取消"; }
    function late(t) { return t.due < iso(today) && !closed(t); }
    function timeBucket(t) {
      if (late(t)) return "逾期";
      const diff = Math.round((new Date(t.due + "T00:00:00") - new Date(iso(today) + "T00:00:00")) / 86400000);
      if (diff === 0) return "今天";
      if (diff === 1) return "明天";
      if (diff === 2) return "后天";
      if (diff > 2 && diff <= 5) return `${diff}天后`;
      return "以后";
    }
    function dateLabel(date) {
      const diff = Math.round((new Date(date + "T00:00:00") - new Date(iso(today) + "T00:00:00")) / 86400000);
      const d = new Date(date + "T00:00:00");
      const md = `${d.getMonth() + 1}/${d.getDate()}`;
      if (diff === 0) return `今天 · ${md}`;
      if (diff === 1) return `明天 · ${md}`;
      if (diff === 2) return `后天 · ${md}`;
      if (diff > 2) return `${diff}天后 · ${md}`;
      return `逾期 ${Math.abs(diff)}天 · ${md}`;
    }
    function normalizePriorityLabel(rawPriority) {
      const p = String(rawPriority || "").trim();
      if (p === "P1重要" || p === "重要" || p === "P0紧急") return "重要";
      return "不重要";
    }
    function advanceDateOneDay(dateStr) {
      const base = String(dateStr || "").trim() || iso(today);
      const hasIsoDate = /^\d{4}-\d{2}-\d{2}$/.test(base);
      const d = new Date(hasIsoDate ? `${base}T00:00:00` : base);
      if (Number.isNaN(d.getTime())) return add(1);
      d.setDate(d.getDate() + 1);
      return iso(d);
    }
    function pill(text) {
      const cls = text === "重要" || text === "逾期" || text === "已取消" ? "red" :
        text === "不重要" ? "neutral" :
        text === "已延期" ? "amber" :
        text === "P1重要" || text === "P0紧急" ? "red" :
        text === "已完成" ? "green" :
        text === "进行中" || text === "等待反馈" ? "teal" :
        text === "待确认" ? "blue" : "";
      return `<span class="pill ${cls}">${esc(text)}</span>`;
    }
    function visibleTasks() {
      const q = $("searchBox").value.trim().toLowerCase();
      const type = $("typeFilter").value;
      const owner = $("ownerFilter").value;
      return data.tasks.filter(t => {
        if (closed(t)) return false;
        if (activeRange === "late" && !late(t)) return false;
        if (activeRange !== "late" && activeRange !== "all" && !late(t)) {
          const diff = daysFromToday(t.due);
          if (diff < 0 || diff >= Number(activeRange)) return false;
        }
        if (type && t.type !== type) return false;
        if (owner && t.ownerId !== owner) return false;
        if (q && !`${t.name} ${category(t.categoryId).name} ${project(t.projectId).name} ${t.done} ${t.next}`.toLowerCase().includes(q)) return false;
        return true;
      }).sort((a, b) => taskDisplayRank(a) - taskDisplayRank(b)
        || schema.priorities.indexOf(a.priority) - schema.priorities.indexOf(b.priority)
        || String(a.due || "").localeCompare(String(b.due || ""))
        || String(a.name || "").localeCompare(String(b.name || "")));
    }

    function dateDisplayRank(date) {
      const diff = daysFromToday(date);
      if (diff === 0) return 0;
      if (diff === 1) return 1;
      if (diff > 1) return 10 + diff;
      return 1000 + Math.abs(diff);
    }

    function taskDisplayRank(task) {

    function renderDailyCheckin() {
      const container = $("dailyCheckinBox");
      if (!container) return;
      ensureDailyCheckinForToday();
      const report = buildDailyCheckinReport();

    function buildRecallMessage(item, existing) {

    async function refreshRecallInboxFromService() {
      if (STANDALONE_MOBILE_MODE) return [];
      if (!isInboxAutoFillEnabled()) return [];
      const res = await fetch(`${recallApi}/api/results?t=${Date.now()}`, { cache: "no-store" });
      const body = await res.json();
      if (!body.ok || !Array.isArray(body.items)) return [];
      const remoteItems = [];
      const remoteSeen = new Set();
      body.items.forEach(item => {
        if (!item || !item.id || remoteSeen.has(item.id)) return;
        remoteSeen.add(item.id);
        remoteItems.push(item);
      });
      const existing = new Map();
      const offlineMessages = [];
      data.messages.forEach(msg => {
        if (isRecallMessage(msg)) {
          existing.set(msg.entryId, msg);
        } else {
          offlineMessages.push(msg);
        }
      });
      const merged = [];
      const syncTasks = [];
      remoteItems.forEach(item => {
        if (!item || !item.id) return;
        const now = existing.get(item.id);
        const msg = buildRecallMessage(item, now);
        merged.push(msg);
        if (isFinalReceiptStatus(item.status) && (!now || now.status !== item.status || !now.resultHtml)) {
          syncTasks.push(syncTasksFromRecallItem(item));
        }
      });
      merged.sort((a, b) => (b.time || "").localeCompare(a.time || ""));
      data.messages = [...merged, ...offlineMessages];
      save();
      await Promise.all(syncTasks);
      return remoteItems;
    }

    function receiptStage(status) {
      if (status === "运行失败") return "fail";
      if (status === "已处理" || status === "已答复") return "answered";
      if (status === "处理中") return "processing";
      if (status === "排队中" || status === "待Codex处理") return "queued";
      return "received";
    }
    function renderReceiptFlow(status) {
      const stage = receiptStage(status);
      const order = ["received", "queued", "processing", "answered"];
      const labels = { received: "已收件", queued: "排队中", processing: "处理中", answered: "已答复" };
      const activeIndex = order.indexOf(stage);
      return `<div class="receipt-flow">${order.map((key, index) => {
        const cls = stage === "fail" && key === "processing" ? "fail" : index <= activeIndex ? "on" : "";
        return `<span class="receipt-step ${cls}">${labels[key]}</span>`;
      }).join("")}</div>`;
    }
    function userReceipt(item) {
      const id = item.id;

      if (item.status === "处理中") return `已正式收件，编号 ${id}。Codex 正在处理，正在拆任务、排日期、生成计划表。`;
      if (item.status === "运行失败") return `处理没有完成，编号 ${id}。原因：${item.result_summary || "后台接手失败，请查看服务窗口或稍后重试。"}`;
      if (item.status === "排队中" || item.status === "待Codex处理") return `已正式收件，编号 ${id}。当前在排队中，等待 Codex 接手。`;
      return `已正式收件，编号 ${id}。当前状态：${item.status || "已收件"}`;
    }

        const activeCount = (body.active || []).length;
        const failedCount = (body.failed || []).length;
        $("serviceStatus").textContent = `本地召回服务已连接。排队/处理中 ${activeCount} 条，失败 ${failedCount} 条。上次刷新 ${nowClock()}`;
      } catch (err) {
        $("serviceStatus").className = "service-status warn";
        $("serviceStatus").textContent = location.protocol === "file:"
          ? `未检测到可用召回服务端口。请先启动全链路服务（8790x 或 8800/8801）。${formatStateHostFailureTip() ? `${formatStateHostFailureTip()}。` : ""}上次检查 ${nowClock()}`
          : `本地召回服务未连接：${err.message || err}（${nowClock()}）`;
      }
    }
    function resumeRecallPolling() {
      if (STANDALONE_MOBILE_MODE) return;
      data.messages
        .filter(m => m.entryId && String(m.entryId).startsWith("WP-") && !["已处理", "已答复", "运行失败"].includes(m.status))
        .slice(0, 5)
        .forEach(m => pollRecallResult(m.entryId));
    }
    window.toggleDone = (id, checked) => {
      const t = data.tasks.find(x => String(x.id) === String(id));
      if (!t) return;
      setTaskCompletionLock(id, checked);
      t.status = checked ? "已完成" : "待办";
      t.completedAt = checked ? iso(today) : "";
      save();
      render();
    };
    window.postponeTaskToTomorrow = (id) => {
      const t = data.tasks.find(x => String(x.id) === String(id));
      if (!t) return;
      t.status = "待办";
      t.due = add(1);
      t.completedAt = "";
      save();
      render();
    };
    window.toggleImportant = (id) => {
      const t = data.tasks.find(x => String(x.id) === String(id));
      if (!t) return;
      const isImportant = normalizePriorityLabel(t.priority) === "重要";
      t.priority = isImportant ? "P2普通" : "P1重要";
      save();
      render();
    };
    window.supplementTask = (id) => {
      const t = data.tasks.find(x => x.id === id);
      if (!t) return;
      selectedCategories = taskCategoryIds(t);
      $("messageText").value = `补充任务「${t.name}」：负责人、截止时间、完成标准、优先级、下一步动作。`;
      renderProjects();
      renderTop();
      $("messageText").focus();
    }
    $("sendMessage").onclick = sendMessage;
    $("localTaskLibrary").onclick = () => {
      viewMode = "date";
      activeRange = "30";
      $("searchBox").value = "";
      render();
    };
    $("localScheduleView").onclick = () => {
      viewMode = "date";
      activeRange = "7";
      render();
    };
    $("localCategoryView").onclick = () => {
      viewMode = "category";
      render();
    };
    $("localReceiptView").onclick = () => {
      document.getElementById("inbox").scrollIntoView({ behavior: "smooth", block: "start" });
    };
    $("hardRefreshBtn").onclick = refreshAllState;
    $("refreshReceipts").onclick = refreshAllReceipts;
    $("clearInbox").onclick = clearAndSyncInbox;
    $("clearInboxTop").onclick = clearAndSyncInbox;
    window.addEventListener("storage", (event) => {
      if (event.key !== storageKey && event.key !== statePulseKey) return;
      syncStateFromStorage();
    });
    if (stateSyncChannel) {
      stateSyncChannel.onmessage = (event) => {
        const payload = event.data;
        if (!payload || payload.type !== "workCockpitStateSync") return;
        if (!payload.state || typeof payload.state !== "object") return;
        const snapshot = data;
        data = mergePendingLocalTasks(payload.state, snapshot);
        localStorage.setItem(storageKey, JSON.stringify(data));
        render();
      };
    }
    window.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        refreshStateFromServer().catch(() => {});
      }
    });
    window.addEventListener("focus", () => {
      syncStateFromStorage();
    });
    $("exportBtn").onclick = () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "work-life-plan-mobile.json";
      a.click();
      URL.revokeObjectURL(url);
    };
    $("typeFilter").onchange = renderTimeline;
    $("ownerFilter").onchange = renderTimeline;
    $("searchBox").oninput = renderTimeline;
    document.querySelectorAll(".chip[data-mode]").forEach(btn => btn.onclick = () => {
      btn.classList.toggle("active");
      $("messageText").focus();
    });
    (async () => {
      await refreshStateFromServer().catch(() => {});
      await importBundledOriginalState().catch(() => {});
      render();
      if (new URLSearchParams(location.search).get("clearInbox") === "1") {
        await clearAndSyncInbox().catch(() => {});
      }
      checkServiceHealth();
      resumeRecallPolling();
      setInterval(checkServiceHealth, 10000);
      if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
        navigator.serviceWorker.register("./sw.js?v=20260629-sync20").catch(() => {});
      }
    })().catch(() => {});
  </script>
</body>
</html>
